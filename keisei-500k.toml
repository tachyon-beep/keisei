# keisei-500k.toml — "Hikaru" (光る, to shine) — Overnight 500K-epoch run on 2x RTX 4060 Ti
#
# Hardware: 2x NVIDIA RTX 4060 Ti 16GB (DDP)
# Model:    KataGo SE-ResNet b10c128 (~7.5M params)
# Purpose:  Extended burn-in run to validate reward collection fix and
#           establish baseline training curves. Run overnight, check in AM.
#
# Launch:   ./run-500k.sh
# Dashboard: http://keisei.foundryside.dev:8741

[model]
display_name = "Hikaru"
architecture = "se_resnet"

[model.params]
num_blocks = 10
channels = 128
se_reduction = 8
global_pool_channels = 64
policy_channels = 16
value_fc_size = 128
score_fc_size = 64
obs_channels = 50

[training]
num_games = 32              # per-rank → 64 total envs across 2 GPUs
max_ply = 512               # also used as steps_per_epoch if not overridden
algorithm = "katago_ppo"
checkpoint_interval = 100   # save every 100 epochs (~50 min at 30s/epoch)
checkpoint_dir = "checkpoints/500k/"
use_amp = true

[training.algorithm_params]
learning_rate = 0.0002
gamma = 0.99
gae_lambda = 0.95
clip_epsilon = 0.2
epochs_per_batch = 4
batch_size = 256
lambda_policy = 1.0
lambda_value = 1.5
lambda_score = 0.1              # R3: was 0.02
lambda_entropy = 0.01
score_normalization = 76.0
grad_clip = 1.0
use_terminated_for_gae = true   # R1
score_blend_alpha = 0.1         # R2
entropy_decay_epochs = 200      # R5

[display]
moves_per_minute = 30
db_path = "data/keisei.db"

[distributed]
sync_batchnorm = true
gradient_as_bucket_view = true
