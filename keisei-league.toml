# keisei-league.toml — "Musashi" (武蔵, lone duelist) — League training (single-GPU)
#
# Hardware: Single GPU (RTX 4060 Ti 16GB or similar)
# Model:    KataGo SE-ResNet b10c128 (~7.5M params) — must match checkpoint architecture
# Purpose:  League self-play with opponent pool and Elo tracking.
#           Seed from a DDP-trained checkpoint (e.g. from run-500k.sh).
#
# Launch:   ./run-league.sh checkpoints/500k/epoch_00100.pt
#
# League mode trains the learner against sampled historical opponents.
# Every snapshot_interval epochs, the current model is snapshotted into the
# opponent pool. The learner always plays Black (side 0); opponents play White.
# Elo ratings track relative strength across the pool.
#
# NOTE: League mode is single-GPU only. DDP produces unequal buffer sizes
# across ranks due to split-merge, causing NCCL allreduce deadlocks.

[model]
display_name = "Musashi"
architecture = "se_resnet"

# Must match the checkpoint architecture exactly
[model.params]
num_blocks = 10
channels = 128
se_reduction = 8
global_pool_channels = 64
policy_channels = 16
value_fc_size = 128
score_fc_size = 64
obs_channels = 50

[training]
num_games = 64              # single-GPU, more envs to compensate
max_ply = 512
algorithm = "katago_ppo"
checkpoint_interval = 50
checkpoint_dir = "checkpoints/league/"
use_amp = true

[training.algorithm_params]
learning_rate = 0.0001      # lower LR for fine-tuning from checkpoint
gamma = 0.99
gae_lambda = 0.95
clip_epsilon = 0.2
epochs_per_batch = 4
batch_size = 256
lambda_policy = 1.0
lambda_value = 1.5
lambda_score = 0.1              # R3: was 0.02
lambda_entropy = 0.01
score_normalization = 76.0
grad_clip = 1.0
use_terminated_for_gae = true   # R1
score_blend_alpha = 0.1         # R2
entropy_decay_epochs = 200      # R5

[display]
moves_per_minute = 30
db_path = "data/keisei-league.db"

[league]
enabled = true
mode = "mixed"
max_active_entries = 20     # hard cap: 5 frontier + 5 recent + 10 dynamic (§1, §18)
snapshot_interval = 25      # snapshot model into pool every 25 epochs
epochs_per_seat = 10        # play 10 epochs per sampled opponent
elo_k_factor = 32.0
tournament_enabled = true
tournament_device = "cuda:0" # single-GPU: share with learner
tournament_num_envs = 32     # smaller than learner to reduce contention
tournament_games_per_match = 3    # best-of-3
tournament_pause_seconds = 1.0

[league.active]
frontier_static_slots = 5   # §4.1A: current measurement yardstick
recent_fixed_slots = 5      # §4.1B: fresh blood / probation queue
dynamic_slots = 10           # §4.1C: live trainable population

[league.concurrency]
parallel_matches = 2
envs_per_match = 8
total_envs = 16
max_resident_models = 6

[league.dynamic]
training_enabled = false     # single-GPU: disable dynamic training to save VRAM

[league.history]
slots = 5
refresh_interval_epochs = 50

[league.gauntlet]
enabled = true
interval_epochs = 50
games_per_matchup = 8
