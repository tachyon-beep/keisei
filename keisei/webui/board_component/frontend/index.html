<!DOCTYPE html>
<!--
  Shogi Board — Interactive Streamlit Custom Component
  ====================================================
  Vanilla JS frontend for the shogi board with click-to-inspect.
  Used by declare_component("shogi_board") in board_component/__init__.py.

  Features:
  - role="grid" with roving tabindex (APG grid widget pattern)
  - Click/keyboard selection with bidirectional Streamlit events
  - Focus tracking with debounced blur for pause/unpause
  - Heatmap log-normalization done client-side
  - Piece images passed as base64 data URIs from Python

  Spec: docs/superpowers/specs/2026-03-26-board-interactivity-design.md
-->
<html>
<head>
  <title>Shogi Board Component</title>
  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; background: transparent; }

    table[role="grid"] {
      border-collapse: collapse;
      margin: auto;
    }

    table[role="grid"] th {
      text-align: center;
      font-weight: bold;
      font-size: 12px;
      padding: 2px 4px;
    }

    /* Dark theme: readable column/row headers */
    @media (prefers-color-scheme: dark) {
      table[role="grid"] th { color: #e0e0e0; }
    }

    /* Focus indicator: dashed, muted — indicates cursor position only.
       #666 gives ~3.5:1 against lighter wheat (#f5deb3), passing WCAG 1.4.11. */
    td[role="gridcell"]:focus {
      outline: 2px dashed #666;
      outline-offset: -2px;
      z-index: 1;
      position: relative;
    }

    /* Selected indicator: solid, prominent — indicates inspected square */
    td[role="gridcell"].selected {
      outline: 3px solid #2a52b0 !important;
      outline-offset: -3px;
      background-color: rgba(42,82,176,0.25) !important;
      z-index: 2;
      position: relative;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Streamlit component lib — served by Streamlit's static file server -->
  <script src="streamlit-component-lib.js"></script>

  <script>
    // =========================================================================
    // State
    // =========================================================================
    var CELL_SIZE = 48;
    var FIXED_HEIGHT = CELL_SIZE * 10 + 40;  // 520px

    // Roving tabindex position
    var focusRow = 0;
    var focusCol = 0;

    // Selection state (can differ from focus position)
    var selectedRow = null;
    var selectedCol = null;

    // Focus tracking for pause/unpause
    var boardFocused = false;
    var blurTimeout = null;

    // Cached args from last render
    var currentArgs = null;

    // =========================================================================
    // Heatmap normalization (ported from _compute_heatmap_overlay in Python)
    // =========================================================================
    function computeHeatmapOverlay(heatmap) {
      if (!heatmap) return null;

      var EPSILON = 1e-10;
      var flat = [];
      for (var r = 0; r < 9; r++) {
        for (var c = 0; c < 9; c++) {
          var v = heatmap[r][c];
          if (v > EPSILON) flat.push(v);
        }
      }
      if (flat.length === 0) return null;

      var logMin = Math.log(Math.min.apply(null, flat) + EPSILON);
      var logMax = Math.log(Math.max.apply(null, flat) + EPSILON);
      var logRange = (logMax > logMin) ? (logMax - logMin) : 1.0;

      var result = [];
      for (var r = 0; r < 9; r++) {
        var row = [];
        for (var c = 0; c < 9; c++) {
          var v = heatmap[r][c];
          if (v <= EPSILON) {
            row.push(0.0);
          } else {
            var norm = (Math.log(v + EPSILON) - logMin) / logRange;
            row.push(Math.max(0.0, Math.min(1.0, norm)));
          }
        }
        result.push(row);
      }
      return result;
    }

    // =========================================================================
    // Piece rendering helpers
    // =========================================================================

    /** Build aria-label for a cell's contents (mirrors _piece_aria_label). */
    function pieceAriaLabel(piece) {
      if (!piece) return "empty square";
      var ptype = piece.type.replace(/_/g, " ");
      return piece.color + " " + ptype;
    }

    /**
     * Map a piece dict to its SVG cache key (mirrors _piece_image_key).
     * Keys: "pawn_black", "promoted_bishop_white", etc.
     */
    function pieceImageKey(piece) {
      var PROMOTED_TYPES = [
        "promoted_pawn", "promoted_lance", "promoted_knight",
        "promoted_silver", "promoted_bishop", "promoted_rook"
      ];
      var ptype = piece.type;
      var color = piece.color;
      if (piece.promoted && PROMOTED_TYPES.indexOf(ptype) === -1) {
        ptype = "promoted_" + ptype;
      }
      return ptype + "_" + color;
    }

    // =========================================================================
    // Board rendering
    // =========================================================================
    function renderBoard() {
      if (!currentArgs) return;

      var boardState = currentArgs.board_state || {};
      var heatmap = currentArgs.heatmap || null;
      var pieceImages = currentArgs.piece_images || {};
      var board = boardState.board || [];
      var moveCount = boardState.move_count || 0;
      var currentPlayer = boardState.current_player || "unknown";

      if (board.length === 0) {
        // Only show "no data" message if the board has never been rendered.
        // During re-renders with empty args (e.g., between episodes), preserve
        // the previous DOM so focus state and roving tabindex remain intact.
        if (!document.getElementById("shogi-board")) {
          document.getElementById("root").innerHTML =
            '<p style="text-align:center;color:#888;">No board data</p>';
        }
        return;
      }

      // Pre-compute heatmap overlay (log-scale normalization)
      var overlay = computeHeatmapOverlay(heatmap);

      // --- Build HTML ---
      var html = "";

      // Column headers (file numbers 9 down to 1, left to right)
      html += '<thead role="rowgroup"><tr>';
      html += '<th scope="col" aria-hidden="true"></th>';
      for (var f = 9; f >= 1; f--) {
        html += '<th scope="col">' + f + '</th>';
      }
      html += '</tr></thead>';

      // Board rows
      html += '<tbody role="rowgroup">';
      for (var r = 0; r < board.length; r++) {
        var rank = r + 1;
        var row = board[r];

        // Row header (rank number)
        html += '<tr>';
        html += '<th scope="row">' + rank + '</th>';

        for (var c = 0; c < 9; c++) {
          var piece = row[c];
          var fileNum = 9 - c;
          var aria = pieceAriaLabel(piece);
          // Use "File N Rank M" format to avoid collision with move notation
          // (e.g. "7-6" looks like a move). Panel header uses compact "76".
          var cellLabel = "File " + fileNum + " Rank " + rank + ": " + aria;

          // Alternating background
          var bg = ((r + c) % 2 === 0) ? "#f5deb3" : "#deb887";

          // Promotion zone tint
          var zoneTint = "";
          if (rank <= 3) {
            zoneTint = "background-image:linear-gradient(" +
              "rgba(100,149,237,0.08),rgba(100,149,237,0.08));";
          } else if (rank >= 7) {
            zoneTint = "background-image:linear-gradient(" +
              "rgba(220,80,80,0.08),rgba(220,80,80,0.08));";
          }

          // Rank 3/6 thicker bottom border
          var borderBottom = "1px solid #8b7355";
          if (rank === 3 || rank === 6) {
            borderBottom = "2.5px solid #6b5335";
          }

          // Heatmap overlay
          var heatStyle = "";
          if (overlay && overlay[r][c] > 0.01) {
            var alpha = (overlay[r][c] * 0.5).toFixed(2);
            heatStyle = "box-shadow:inset 0 0 0 100px rgba(255,140,0," + alpha + ");";
          }

          // Roving tabindex: only the focus-position cell gets tabindex="0"
          var tabIdx = (r === focusRow && c === focusCol) ? "0" : "-1";

          // Selected class
          var cls = (r === selectedRow && c === selectedCol) ? ' class="selected"' : "";

          // Cell content: piece image or text fallback
          var content = "";
          if (piece) {
            var key = pieceImageKey(piece);
            var svgUri = pieceImages[key] || "";
            if (svgUri) {
              var imgSz = CELL_SIZE - 8;
              // alt="" because cell aria-label already describes the piece;
              // non-empty alt would cause double-announcement in screen readers.
              content = '<img src="' + svgUri + '" width="' + imgSz +
                '" height="' + imgSz + '" alt=""' +
                ' style="pointer-events:none;">';
            } else {
              // Text fallback (no SVG available)
              // #8b0000 gives 4.2:1 against darker wheat (#deb887), passing AA
              var label = piece.type.charAt(0).toUpperCase();
              if (piece.promoted) label = "+" + label;
              var txtColor = (piece.color === "black") ? "#000" : "#8b0000";
              content = '<span style="color:' + txtColor +
                ';font-weight:bold;pointer-events:none;">' + label + '</span>';
            }
          }

          // aria-selected for screen reader selection announcement
          var isSelected = (r === selectedRow && c === selectedCol);
          var ariaSelected = isSelected ? "true" : "false";

          html += '<td role="gridcell" tabindex="' + tabIdx + '"' +
            ' data-row="' + r + '" data-col="' + c + '"' +
            ' aria-label="' + cellLabel + '"' +
            ' aria-selected="' + ariaSelected + '"' +
            ' aria-rowindex="' + (r + 1) + '"' +
            ' aria-colindex="' + (c + 1) + '"' +
            cls +
            ' style="width:' + CELL_SIZE + 'px;height:' + CELL_SIZE + 'px;' +
            'background:' + bg + ';text-align:center;vertical-align:middle;' +
            'border:1px solid #8b7355;border-bottom:' + borderBottom + ';' +
            'cursor:pointer;' +
            zoneTint + heatStyle + '">' +
            content + '</td>';
        }
        html += '</tr>';
      }
      html += '</tbody>';

      // Grid aria-label (orientation guidance from original caption)
      var gridLabel = "Shogi board position, move " + moveCount + ", " +
        currentPlayer.charAt(0).toUpperCase() + currentPlayer.slice(1) +
        " to play. Black (Sente) plays from bottom, White (Gote) from top.";

      var tableHtml = '<table id="shogi-board" role="grid" ' +
        'aria-rowcount="9" aria-colcount="9" ' +
        'style="border-collapse:collapse;margin:auto;" ' +
        'aria-label="' + gridLabel + '">' +
        html + '</table>';

      document.getElementById("root").innerHTML = tableHtml;

      // Restore focus to the roving-tabindex cell if the board had focus
      if (boardFocused) {
        var focusCell = getCell(focusRow, focusCol);
        if (focusCell) focusCell.focus();
      }

      // Set fixed frame height (prevents scroll jitter)
      Streamlit.setFrameHeight(FIXED_HEIGHT);
    }

    // =========================================================================
    // Cell lookup helper
    // =========================================================================
    function getCell(row, col) {
      return document.querySelector(
        'td[data-row="' + row + '"][data-col="' + col + '"]'
      );
    }

    // =========================================================================
    // Roving tabindex management
    // =========================================================================
    function moveFocusTo(newRow, newCol) {
      // Clamp to grid bounds
      newRow = Math.max(0, Math.min(8, newRow));
      newCol = Math.max(0, Math.min(8, newCol));

      // Guard for arrow-key navigation only; renderBoard() handles refocus
      // on re-render independently via the boardFocused check.
      if (newRow === focusRow && newCol === focusCol) return;

      // Shift tabindex
      var oldCell = getCell(focusRow, focusCol);
      var newCell = getCell(newRow, newCol);
      if (oldCell) oldCell.setAttribute("tabindex", "-1");
      if (newCell) {
        newCell.setAttribute("tabindex", "0");
        newCell.focus();
      }

      focusRow = newRow;
      focusCol = newCol;
    }

    // =========================================================================
    // Selection toggle
    // =========================================================================
    function toggleSelect(row, col) {
      if (selectedRow === row && selectedCol === col) {
        // Deselect
        selectedRow = null;
        selectedCol = null;
        Streamlit.setComponentValue({type: "deselect"});
      } else {
        // Select
        selectedRow = row;
        selectedCol = col;
        Streamlit.setComponentValue({row: row, col: col, type: "select"});
      }
      renderBoard();
    }

    // =========================================================================
    // Event handlers (attached via delegation on #root)
    // =========================================================================
    document.getElementById("root").addEventListener("click", function(e) {
      var cell = e.target.closest("td[role='gridcell']");
      if (!cell) return;

      var row = parseInt(cell.dataset.row);
      var col = parseInt(cell.dataset.col);

      // Update roving tabindex to clicked cell
      moveFocusTo(row, col);
      toggleSelect(row, col);
    });

    document.getElementById("root").addEventListener("keydown", function(e) {
      var cell = e.target.closest("td[role='gridcell']");
      if (!cell) return;

      var row = parseInt(cell.dataset.row);
      var col = parseInt(cell.dataset.col);

      switch (e.key) {
        case "ArrowUp":
          e.preventDefault();
          moveFocusTo(row - 1, col);
          break;
        case "ArrowDown":
          e.preventDefault();
          moveFocusTo(row + 1, col);
          break;
        case "ArrowLeft":
          e.preventDefault();
          moveFocusTo(row, col - 1);
          break;
        case "ArrowRight":
          e.preventDefault();
          moveFocusTo(row, col + 1);
          break;
        // APG grid widget: Home/End navigate within row, Ctrl+Home/End to grid corners
        case "Home":
          e.preventDefault();
          if (e.ctrlKey) {
            moveFocusTo(0, 0);
          } else {
            moveFocusTo(row, 0);
          }
          break;
        case "End":
          e.preventDefault();
          if (e.ctrlKey) {
            moveFocusTo(8, 8);
          } else {
            moveFocusTo(row, 8);
          }
          break;
        // APG grid widget: PageUp/PageDown jump to first/last row (grid is 9 rows)
        case "PageUp":
          e.preventDefault();
          moveFocusTo(0, col);
          break;
        case "PageDown":
          e.preventDefault();
          moveFocusTo(8, col);
          break;
        case "Enter":
        case " ":
          e.preventDefault();
          toggleSelect(focusRow, focusCol);
          break;
        case "Escape":
          e.preventDefault();
          if (selectedRow !== null) {
            selectedRow = null;
            selectedCol = null;
            Streamlit.setComponentValue({type: "deselect"});
            renderBoard();
          }
          break;
        // Tab/Shift-Tab: do NOT preventDefault — let browser exit the grid
      }
    });

    // =========================================================================
    // Focus tracking (focusin/focusout with debounce)
    // =========================================================================
    document.getElementById("root").addEventListener("focusin", function(e) {
      if (e.target.matches && e.target.matches("td[role='gridcell']")) {
        clearTimeout(blurTimeout);
        if (!boardFocused) {
          boardFocused = true;
          Streamlit.setComponentValue({type: "focus"});
        }
      }
    });

    document.getElementById("root").addEventListener("focusout", function(e) {
      clearTimeout(blurTimeout);
      blurTimeout = setTimeout(function() {
        // Check if focus moved outside the grid entirely
        var active = document.activeElement;
        if (!active || !active.matches || !active.matches("td[role='gridcell']")) {
          boardFocused = false;
          Streamlit.setComponentValue({type: "blur"});
        }
      }, 100);
    });

    // =========================================================================
    // Streamlit component lifecycle
    // =========================================================================
    var firstRender = true;

    function onRender(event) {
      var args = event.detail.args;
      currentArgs = args;

      // On first render only: initialize roving tabindex and selection
      // from the selected_square arg passed by Python session state.
      // Subsequent renders must NOT override JS-side selection state
      // (the user may have clicked to deselect since Python last knew).
      // Guard: only consume firstRender when args contain meaningful data,
      // to handle Streamlit's potential initial empty RENDER_EVENT.
      if (firstRender && args && (args.board_state || args.selected_square)) {
        firstRender = false;
        if (args.selected_square && typeof args.selected_square === "object") {
          focusRow = args.selected_square.row || 0;
          focusCol = args.selected_square.col || 0;
          selectedRow = focusRow;
          selectedCol = focusCol;
        }
      }

      renderBoard();
    }

    Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
    Streamlit.setComponentReady();
    // Pre-allocate height before first render to prevent layout jitter on load.
    // Also called at end of renderBoard() to maintain height after DOM rebuild.
    Streamlit.setFrameHeight(FIXED_HEIGHT);
  </script>
</body>
</html>
