# keisei-katago.toml — KataGo SE-ResNet b40c256 training config

[model]
display_name = "KataGo-SE-b40c256"
architecture = "se_resnet"

[model.params]
num_blocks = 40
channels = 256
se_reduction = 16
global_pool_channels = 128
policy_channels = 32
value_fc_size = 256
score_fc_size = 128
obs_channels = 50

[training]
num_games = 128
max_ply = 512
algorithm = "katago_ppo"
checkpoint_interval = 50
checkpoint_dir = "checkpoints/katago/"

[training.algorithm_params]
learning_rate = 0.0002
gamma = 0.99
gae_lambda = 0.95
clip_epsilon = 0.2
epochs_per_batch = 4
batch_size = 256
lambda_policy = 1.0
lambda_value = 1.5
lambda_score = 0.02
lambda_entropy = 0.01
score_normalization = 76.0
grad_clip = 1.0

[display]
moves_per_minute = 30
db_path = "keisei-katago.db"
