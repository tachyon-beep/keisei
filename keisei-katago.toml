# keisei-katago.toml — "Musashi" (武蔵, lone duelist) — Single-GPU KataGo training (league-capable)
#
# Hardware: Single GPU (RTX 4060 Ti 16GB or similar)
# Model:    KataGo SE-ResNet b40c256 (~120M params)
# Purpose:  Single-GPU training with optional league mode.
#           League mode (opponent pool, Elo tracking) requires single-GPU
#           because split-merge produces unequal buffer sizes across ranks.
#
# Launch:   ./run-training.sh --config keisei-katago.toml --ngpus 1

[model]
display_name = "Musashi"
architecture = "se_resnet"

[model.params]
num_blocks = 40
channels = 256
se_reduction = 16
global_pool_channels = 128
policy_channels = 32
value_fc_size = 256
score_fc_size = 128
obs_channels = 50

[training]
num_games = 128
max_ply = 512
algorithm = "katago_ppo"
checkpoint_interval = 50
checkpoint_dir = "checkpoints/katago/"
use_amp = true

[training.algorithm_params]
learning_rate = 0.0002
gamma = 0.99
gae_lambda = 0.95
clip_epsilon = 0.2
epochs_per_batch = 4
batch_size = 1024
lambda_policy = 1.0
lambda_value = 1.5
lambda_score = 0.1              # R3: was 0.02
lambda_entropy = 0.01
score_normalization = 76.0
grad_clip = 1.0
compile_mode = "default"
use_terminated_for_gae = true   # R1
score_blend_alpha = 0.1         # R2
entropy_decay_epochs = 200      # R5

[display]
moves_per_minute = 30
db_path = "data/keisei-katago.db"

# For league mode, use keisei-league.toml + run-league.sh instead.
# League requires matching architecture between checkpoint and config.
